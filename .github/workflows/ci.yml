name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (test + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (pure-Rust core)
        run: cargo clippy --all-targets -- -D warnings

      - name: Unit tests
        run: cargo test --verbose

  python:
    name: Python (maturin build + pytest)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build + test tooling
        run: python -m pip install --upgrade pip maturin pytest

      - name: Clippy (extension-module bindings)
        run: cargo clippy --features extension-module --lib -- -D warnings

      - name: Build extension (maturin)
        run: maturin build --release --out dist

      - name: Install built wheel
        run: python -m pip install --no-index --find-links dist pyoptx

      - name: Run pytest
        run: pytest -q
